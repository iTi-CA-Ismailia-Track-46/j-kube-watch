apiVersion: apps/v1
kind: Deployment
metadata:
  name: creative-operator
  namespace: creative-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: creative-operator
  template:
    metadata:
      labels:
        app: creative-operator
    spec:
      serviceAccountName: creative-operator-sa
      containers:
        - name: operator
          image: adham0/createive-operator:latest
          imagePullPolicy: Always