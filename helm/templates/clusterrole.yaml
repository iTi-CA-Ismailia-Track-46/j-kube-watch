{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.rbac.roleName }}
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["j-kube-watch.app"]
    resources: ["alertsenders", "alertreceivers"]
    verbs: ["get", "list", "watch"]
{{- end }}
