apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertreceivers.j-kube-watch.app
spec:
  group: j-kube-watch.app
  names:
    kind: AlertReceiver
    plural: alertreceivers
    singular: alertreceiver
    shortNames: ["ar", "alr"]
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              required: ["email", "senderRef"]
              type: object
              properties:
                email: { type: string }
                senderRef: { type: string }
