apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertsenders.creative.app
spec:
  group: creative.app
  names:
    kind: AlertSender
    plural: alertsenders
    singular: alertsender
    shortNames: ["as", "als"]
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - email
                - host
                - secretName
              properties:
                email:
                  type: string
                host:
                  type: string
                port:
                  type: string
                  default: "587"
                secretName:
                  type: string